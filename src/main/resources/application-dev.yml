# =============================================================================
# ⚠️ SECURITY NOTICE: Development Configuration
# =============================================================================
# This file contains DEFAULT DEVELOPMENT CREDENTIALS for local development only.
# DO NOT use these defaults in production or staging environments.
#
# For production, use application-prod.yml with environment variables:
#   - DATASOURCE_USERNAME
#   - DATASOURCE_PASSWORD
#   - All other sensitive configuration
#
# Recommended: Override sensitive values using environment variables or
# docker-compose override files even for development.
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # ⚠️ DEVELOPMENT DEFAULTS - Override in production!
    url: jdbc:postgresql://localhost:5432/payment_gateway
    username: ${DATASOURCE_USERNAME:admin}
    password: ${DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.payment.gateway: DEBUG
    io.micrometer.tracing: DEBUG
    zipkin2: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n"
