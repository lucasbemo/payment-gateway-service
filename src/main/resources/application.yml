spring:
  application:
    name: payment-gateway-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5433/payment_gateway}
    username: ${DATASOURCE_USERNAME:admin}
    password: ${DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,flyway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3,W3C
    baggage:
      remote-fields:
        - X-Correlation-Id
        - X-B3-TraceId
        - X-B3-SpanId
        - X-B3-ParentSpanId
        - X-B3-Sampled
      fields:
        - X-Correlation-Id
        - traceId
        - spanId
        - parentId
        - sampled
zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    root: INFO
    com.payment.gateway: DEBUG
    io.micrometer.tracing: DEBUG
    brave: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    show-extensions: true
    show-common-extensions: true
    deep-linking: true
    default-models-expand-depth: 1
    default-model-expand-depth: 1
  show-actuator: true
  default-flat-param-object: true
  override-with-generic-response: false
  packages-to-scan: com.payment.gateway.infrastructure
  paths-to-match: /api/v1/**

payment:
  provider: ${PAYMENT_PROVIDER:stub}

stripe:
  api-key: ${STRIPE_API_KEY:}
  api-base-url: ${STRIPE_API_BASE_URL:https://api.stripe.com}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
