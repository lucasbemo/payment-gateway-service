# E2E Test Profile Configuration
# Uses Testcontainers for PostgreSQL and Kafka (from ContainerConfig)

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Disable leak detection for tests (causes false positives with @Transactional tests)
      leak-detection-threshold: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  kafka:
    # Bootstrap servers will be set dynamically by ContainerConfig
    consumer:
      group-id: test-e2e-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      # Redis host and port are configured dynamically by ContainerConfig
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

cloud:
  aws:
    region:
      static: us-east-1
    s3:
      enabled: false
    credentials:
      access-key: test
      secret-key: test

logging:
  level:
    root: WARN
    com.payment.gateway: DEBUG
    org.testcontainers: INFO
    com.github.dockerjava: WARN
